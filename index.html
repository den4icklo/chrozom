<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>chrozom2</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Fredoka',sans-serif;
background:linear-gradient(180deg,#ffe7c2,#ffc97a);
color:#4b2e15;
text-align:center;
cursor:url("https://cur.cursors-4u.net/games/gam-15/gam1426.cur"), auto;
}

header{
font-size:50px;
margin:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
}

.card{
background:white;
border-radius:25px;
padding:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.08);
}

.card img{
width:100%;
border-radius:20px;
}

.viewer{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(8px);
display:none;
align-items:center;
justify-content:center;
}

.viewer img{
max-width:80%;
max-height:80%;
border-radius:20px;
}

.arrow{
position:absolute;
top:50%;
font-size:70px;
color:white;
cursor:pointer;
user-select:none;
}

.left{left:40px}
.right{right:40px}

.close{
position:absolute;
top:30px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}

.telegram{
position:fixed;
bottom:20px;
left:20px;
width:50px;
}

.theme{
position:fixed;
bottom:20px;
right:20px;
padding:12px 16px;
border:none;
border-radius:20px;
font-size:18px;
cursor:pointer;
}

.music{
position:fixed;
bottom:90px;
right:20px;
background:white;
padding:10px;
border-radius:15px;
}

button:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<header>chrozom2</header>

<section class="gallery" id="gallery"></section>

<img class="telegram"
src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"
onclick="openTG()">

<button class="theme" onclick="toggleTheme()">🌗</button>

<div class="music">
🎵 <input type="range" min="0" max="1" step="0.01" value="0.4" id="volume">
</div>

<audio id="music" loop autoplay>
<source src="music.mp3">
</audio>

<div class="viewer" id="viewer">

<div class="arrow left" onclick="prev()">❮</div>

<img id="bigImg">

<div class="arrow right" onclick="next()">❯</div>

<div class="close" onclick="closeViewer()">✕</div>

</div>

<script>

let images=[
"images/photo1.jpg.jpg",
"images/photo2.jpg.jpg",
"images/photo3.jpg.jpg"
]

let gallery=document.getElementById("gallery")

images.forEach((src,i)=>{

let card=document.createElement("div")
card.className="card"

let img=document.createElement("img")
img.src=src

img.onclick=()=>openViewer(i)

card.appendChild(img)
gallery.appendChild(card)

})

let viewer=document.getElementById("viewer")
let bigImg=document.getElementById("bigImg")

let index=0

function openViewer(i){

index=i
viewer.style.display="flex"
bigImg.src=images[index]

}

function closeViewer(){

viewer.style.display="none"

}

function next(){

index=(index+1)%images.length
bigImg.src=images[index]

}

function prev(){

index=(index-1+images.length)%images.length
bigImg.src=images[index]

}

function toggleTheme(){

document.body.style.background=
document.body.style.background.includes("ffc97a")
? "linear-gradient(180deg,#1e1b2e,#3a3559)"
: "linear-gradient(180deg,#ffe7c2,#ffc97a)"

}

function openTG(){

window.open("https://t.me/YOUR_LINK","_blank")

}

let music=document.getElementById("music")
let volume=document.getElementById("volume")

volume.addEventListener("input",()=>{

music.volume=volume.value

})

</script>

</body>
</html>
